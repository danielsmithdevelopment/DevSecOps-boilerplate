# Sample app + shared observability stack.
#   cp .env.example .env
#   docker compose up -d

include:
  - path: ../observability/docker-compose.yaml
    env_file: .env

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - observability

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: grafana-stack-app
    networks:
      - observability
    labels:
      - "logging=true"

  prometheus:
    volumes:
      - ./prometheus-app.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/configs/mimir/rules:/etc/prometheus/rules:ro

volumes:
  postgres_data:
