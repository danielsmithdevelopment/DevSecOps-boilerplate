target: all
multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: warn

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: mimir
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: mimir
    kvstore:
      store: memberlist
    replication_factor: 1

ruler:
  alertmanager_url: http://alertmanager:9093

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/alertmanager

limits:
  max_global_series_per_user: 150000
  # Long-term metrics retention (filesystem backend; tune for object storage in prod)
  compactor_blocks_retention_period: 90d
  # Samples/sec per tenant — monitor cortex_discarded_samples_total from day one;
  # Beyla + high-cardinality label sets can hit the default 10k silently.
  ingestion_rate: 10000
  ingestion_burst_size: 200000
  max_label_names_per_series: 30
