auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-04-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://alertmanager:9093
  enable_api: true
  enable_alertmanager_v2: true
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  ring:
    kvstore:
      store: inmemory

limits_config:
  allow_structured_metadata: true
  # How long Loki retains log data. Keep in sync with max_query_lookback /
  # chunk_store_config.max_look_back_period — if look-back is shorter, queries
  # for older-but-still-retained data silently return empty results (no error).
  retention_period: 744h  # 31 days
  max_query_lookback: 744h

chunk_store_config:
  max_look_back_period: 744h  # Must match retention_period (Loki ≤2.x name; kept for clarity)

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 50
  delete_request_store: filesystem
