global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    webhook_configs:
      - url: http://oncall-engine:8080/integrations/v1/alertmanager/
        send_resolved: true
        http_config:
          basic_auth:
            username: admin
            password: admin
