# Runtime security overlay — run alongside the observability stack.
#   docker compose -f docker/observability/docker-compose.yaml up -d
#   docker compose -f docker/observability/docker-compose.security.yaml up -d
#
# Requires Linux (eBPF). Falco/Tetragon/Beyla need kernel headers on the host.
# Wazuh is a simplified single-manager dev layout; production should use wazuh-docker.

name: observability-security

services:
  falco:
    image: falcosecurity/falco:0.41.0
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - ./configs/security/falco/falco.yaml:/etc/falco/config.d/falco.yaml:ro
      - ./configs/security/falco/rules.d:/etc/falco/rules.d:ro
    environment:
      FALCO_GRPC_ENABLED: "true"
      FALCO_GRPC_BIND_ADDRESS: "0.0.0.0:5060"
      FALCO_GRPC_THREADINESS: "8"
    ports:
      - "8765:8765"
    networks:
      - observability
    restart: unless-stopped

  falcosidekick:
    image: falcosecurity/falcosidekick:2.31.0
    environment:
      FALCOSIDEKICK_CUSTOMFIELDS: "source:falco"
      TALON_ADDRESS: http://falco-talon:2803
    depends_on:
      - falco
      - falco-talon
    ports:
      - "2801:2801"
    networks:
      - observability
    restart: unless-stopped

  falco-talon:
    image: falcosecurity/falco-talon:0.2.1
    volumes:
      - ./configs/security/falco-talon/rules.yaml:/etc/falco-talon/rules.yaml:ro
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    ports:
      - "2803:2803"
    networks:
      - observability
    restart: unless-stopped

  tetragon:
    image: quay.io/cilium/tetragon:v1.4.0
    privileged: true
    pid: host
    volumes:
      - /sys/kernel/btf/vmlinux:/var/run/cilium/tetragon/btf
      - ./configs/security/tetragon:/etc/tetragon/tp:ro
    command:
      - /usr/bin/tetragon
      - --config-dir=/etc/tetragon/tp
      - --export-filename=/dev/stdout
      - --metrics-server=:2112
    ports:
      - "2112:2112"
    networks:
      - observability
    restart: unless-stopped

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.11.2
    environment:
      - node.name=wazuh-indexer
      - cluster.initial_master_nodes=wazuh-indexer
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    networks:
      - observability
    restart: unless-stopped

  wazuh-manager:
    image: wazuh/wazuh-manager:4.11.2
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=none
    depends_on:
      - wazuh-indexer
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - ./configs/security/wazuh/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
    networks:
      - observability
    restart: unless-stopped

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.11.2
    depends_on:
      - wazuh-indexer
      - wazuh-manager
    ports:
      - "5601:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh-manager
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    networks:
      - observability
    restart: unless-stopped

networks:
  observability:
    external: true
    name: observability

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
