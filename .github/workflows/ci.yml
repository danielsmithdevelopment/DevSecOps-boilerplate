# CI gate for main: configure branch protection to require "ci-gate".
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  quick:
    name: Quick lint
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: YAML lint
        run: |
          pip install yamllint==1.38.0
          yamllint -c .yamllint.yml .

      - name: Python lint and format
        run: |
          pip install ruff
          ruff check pulumi/aws/prod/function
          ruff format --check pulumi/aws/prod/function

      - uses: hashicorp/setup-packer@main

      - name: Packer format
        run: packer fmt -check -recursive packer/

      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -S warning scripts/*.sh packer/docker/ubuntu-base/install-ansible.sh

      - name: Reject floating container tags
        run: |
          set -euo pipefail
          matches="$(rg 'image:\s*[^\s]+:latest\b' \
            --glob 'docker-compose*.yml' \
            --glob 'docker-compose*.yaml' \
            --glob 'compose*.yml' \
            --glob 'compose*.yaml' \
            . || true)"
          if [ -n "$matches" ]; then
            echo "Pinned images required — found :latest references:"
            echo "$matches"
            exit 1
          fi

  frontend:
    name: Frontend audit
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wallet-auth/frontend/package-lock.json

      - name: npm ci and audit
        working-directory: wallet-auth/frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run build

  terraform:
    name: Terraform format and lint
    needs: quick
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8

      - name: Verify terraform fmt
        run: terraform fmt -check -recursive terraform/

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.54.0

      - name: tflint
        run: |
          set -euo pipefail
          for dir in \
            terraform/linode/dev \
            terraform/linode/modules/linode-instance \
            terraform/linode/modules/cloud-firewall
          do
            echo "Linting ${dir}"
            (
              cd "${dir}"
              terraform init -backend=false -input=false
              tflint --init
              tflint
            )
          done

  ansible:
    name: Ansible lint
    needs: quick
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: ansible-lint
        run: |
          pip install ansible-lint==26.4.0
          ansible-galaxy collection install -r ansible/requirements.yml
          ansible-lint ansible/

  go:
    name: Go lint, format, and test
    needs: quick
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        module:
          - task-runner
          - pulumi/aws/prod
          - docker/grafana-stack
          - development/go/worker-cluster
          - wallet-auth/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Verify gofmt
        working-directory: ${{ matrix.module }}
        run: |
          unformatted="$(gofmt -l -s .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.2

      - name: golangci-lint
        working-directory: ${{ matrix.module }}
        run: golangci-lint run ./...

      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test ./...

  supply-chain:
    name: Supply chain scan
    needs: [go, terraform, ansible, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"

      - name: OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          osv-scanner scan --recursive --config=osv-scanner.toml .

      - name: OSV-Scanner compose images
        run: |
          set -euo pipefail
          chmod +x scripts/list-compose-images.sh
          findings=0
          while IFS= read -r image; do
            echo "OSV scanning ${image}"
            if ! osv-scanner scan image "${image}" --config=osv-scanner.toml; then
              findings=$((findings + 1))
            fi
          done < <(scripts/list-compose-images.sh)
          if [ "${findings}" -gt 0 ]; then
            echo "::warning::OSV reported vulnerabilities in ${findings} compose image(s); see logs and docs/security/VULN_SLA.md for waiver process."
          fi

      - name: Generate repository SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-repository.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-repository-cyclonedx
          path: sbom-repository.cdx.json
          retention-days: 90

  trivy-fs:
    name: Trivy filesystem scan
    needs: [go, terraform, ansible, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan repository
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

  trivy-docker:
    name: Trivy container scan
    needs: go
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - context: task-runner
            file: task-runner/Dockerfile
          - context: development/go/worker-cluster
            file: development/go/worker-cluster/Dockerfile
          - context: docker/grafana-stack
            file: docker/grafana-stack/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          for attempt in 1 2 3; do
            docker build -t scan-target -f "${{ matrix.file }}" "${{ matrix.context }}" && exit 0
            echo "Docker build attempt ${attempt} failed, retrying..."
            sleep 10
          done
          exit 1

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: scan-target
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

  compose-images:
    name: List compose images
    needs: quick
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - uses: actions/checkout@v4

      - name: Build image matrix
        id: set-matrix
        run: |
          chmod +x scripts/list-compose-images.sh
          images="$(scripts/list-compose-images.sh | jq -R -s -c 'split("\n") | map(select(length > 0))')"
          echo "images=${images}" >> "$GITHUB_OUTPUT"

  trivy-compose-images:
    name: Trivy compose image scan
    needs: compose-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.compose-images.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      # Third-party pinned images are scanned for visibility; repo code and
      # built images remain strictly gated by trivy-fs and trivy-docker.
      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}
          pkg-types: os
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: .trivyignore

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - quick
      - frontend
      - terraform
      - ansible
      - go
      - supply-chain
      - trivy-fs
      - trivy-docker
      - trivy-compose-images
    if: always()
    steps:
      - name: Require all checks to pass
        run: |
          check() {
            local name="$1"
            local result="$2"
            if [ "$result" = "cancelled" ]; then
              echo "Job '${name}' was cancelled."
              exit 1
            fi
            if [ "$result" != "success" ]; then
              echo "Job '${name}' result: ${result}"
              exit 1
            fi
          }
          check secret-scan "${{ needs.secret-scan.result }}"
          check quick "${{ needs.quick.result }}"
          check frontend "${{ needs.frontend.result }}"
          check terraform "${{ needs.terraform.result }}"
          check ansible "${{ needs.ansible.result }}"
          check go "${{ needs.go.result }}"
          check supply-chain "${{ needs.supply-chain.result }}"
          check trivy-fs "${{ needs.trivy-fs.result }}"
          check trivy-docker "${{ needs.trivy-docker.result }}"
          check trivy-compose-images "${{ needs.trivy-compose-images.result }}"
          echo "All CI checks passed."
