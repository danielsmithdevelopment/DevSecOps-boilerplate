# Golden image publish: build → Trivy → push → Cosign sign → verify.
# Requires GHCR package permissions and OIDC for keyless signing.
name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  TRIVY_VERSION: 0.59.1

jobs:
  repo-supply-chain:
    name: Repository supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"

      - name: OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          osv-scanner scan --recursive --config=osv-scanner.toml .

      - name: Trivy filesystem
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

  publish:
    name: Publish (${{ matrix.name }})
    needs: repo-supply-chain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: task-runner
            context: task-runner
            file: task-runner/Dockerfile
            image: task-runner
          - name: worker-cluster
            context: development/go/worker-cluster
            file: development/go/worker-cluster/Dockerfile
            image: worker-cluster
          - name: grafana-stack
            context: docker/grafana-stack
            file: docker/grafana-stack/Dockerfile
            image: grafana-stack
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR requires lowercase paths; github.repository preserves repo name casing.
      - name: Set image repository
        id: image
        run: echo "repository=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repository }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Sign image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ steps.image.outputs.repository }}/${{ matrix.image }}@${DIGEST}"

      - name: Verify signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.image.outputs.repository }}/${{ matrix.image }}@${DIGEST}"
