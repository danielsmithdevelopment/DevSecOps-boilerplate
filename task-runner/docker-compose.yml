# Task runner cluster + shared observability stack.
#   cp .env.example .env
#   docker compose up -d
#
# Observability UI: http://localhost:3000 (admin / GF_SECURITY_ADMIN_PASSWORD)
# OnCall engine:    http://localhost:8090

include:
  - path: ../docker/observability/docker-compose.yaml
    env_file: .env

x-task-runner-common: &task-runner-common
  build: .
  env_file:
    - .env
  networks:
    - observability
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  task-runner-1:
    <<: *task-runner-common
    ports:
      - "8080:8080"
    environment:
      INSTANCE_ID: task-runner-1
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: task-runner

  task-runner-2:
    <<: *task-runner-common
    ports:
      - "8081:8080"
    environment:
      INSTANCE_ID: task-runner-2
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: task-runner

  task-runner-3:
    <<: *task-runner-common
    ports:
      - "8082:8080"
    environment:
      INSTANCE_ID: task-runner-3
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: task-runner

  task-runner-4:
    <<: *task-runner-common
    ports:
      - "8083:8080"
    environment:
      INSTANCE_ID: task-runner-4
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: task-runner

  task-runner-5:
    <<: *task-runner-common
    ports:
      - "8084:8080"
    environment:
      INSTANCE_ID: task-runner-5
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: task-runner

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskrunner}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../docker/observability/configs/mimir/rules:/etc/prometheus/rules:ro

volumes:
  postgres-data:
