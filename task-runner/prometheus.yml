global:
  scrape_interval: 15s
  evaluation_interval: 15s

remote_write:
  - url: http://mimir:9009/api/v1/push

scrape_configs:
  - job_name: task-runner
    static_configs:
      - targets:
          - task-runner-1:8080
          - task-runner-2:8080
          - task-runner-3:8080
          - task-runner-4:8080
          - task-runner-5:8080

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: mimir
    static_configs:
      - targets: [mimir:9009]

  - job_name: loki
    static_configs:
      - targets: [loki:3100]

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
