# Worker cluster demo + shared observability stack.
#   docker compose up -d
#   docker compose --profile loadtest run --rm k6

include:
  - path: ../../../docker/observability/docker-compose.yaml

services:
  app:
    build: .
    ports:
      - "4200:4200"
    labels:
      logging: alloy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: worker-cluster
    networks:
      - observability

  prometheus:
    volumes:
      - ./configs/prometheus-app.yml:/etc/prometheus/prometheus.yml:ro
      - ../../../docker/observability/configs/mimir/rules:/etc/prometheus/rules:ro

  k6:
    environment:
      K6_TARGET_URL: http://app:4200
