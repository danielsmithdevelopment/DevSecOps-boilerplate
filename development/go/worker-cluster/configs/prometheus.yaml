global:
  scrape_interval: 10s

remote_write:
  - url: http://mimir:9009/api/v1/push

scrape_configs:
  - job_name: myapp
    static_configs:
      - targets: [app:4200]

  - job_name: mimir
    static_configs:
      - targets: [mimir:9009]

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
