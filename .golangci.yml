run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    # aws-sdk-go v1 until SES migrates to aws-sdk-go-v2 (Dependabot still patches v1).
    - path: wallet-auth/backend/internal/email/ses\.go
      linters:
        - staticcheck
      text: "is deprecated"
